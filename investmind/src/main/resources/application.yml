server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: investmind

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:investmind}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.investmind.model
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 智投进化平台配置
investmind:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

  # 大模型API配置 (以OpenAI格式为例)
  ai:
    api-key: sk-cm5igfBXrGjJoXi5L4Gcsudc9Q0m8YUiMwQQATa3UohMQVWz
    base-url: https://api.moonshot.cn/v1
    model: moonshot-v1-8k
    chat-endpoint: /chat/completions
    embedding-endpoint: /embeddings
    embedding-model: text-embedding-3-small
    web-search-enabled: true
    web-search-base-url: https://s.jina.ai/
    web-search-max-chars: 4000

  # JWT配置
  jwt:
    # JWT密钥（使用Base64编码，生产环境请使用复杂密钥）
    secret: ${JWT_SECRET:SW52ZXN0TWluZFNlY3JldEtleTIwMjRVc2VkRm9ySldUVG9rZW5HZW5lcmF0aW9uQW5kVmFsaWRhdGlvblBsdXNFbm91Z2hMZW5ndGhGb3JIUzUxMkFsZ29yaXRobQ==}
    # 访问令牌过期时间（秒），默认24小时
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:86400}
    # 刷新令牌过期时间（秒），默认7天
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800}

  # 向量数据库 Milvus 配置
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection-name: ${MILVUS_COLLECTION:invest_reports}
    dimension: ${MILVUS_DIMENSION:1536}

# 日志配置
logging:
  level:
    com.investmind: debug
    com.baomidou.mybatisplus: debug




